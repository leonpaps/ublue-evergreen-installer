# Universal Blue Deployment Specification Profile
[customizations.installer]

# The installer schema requires an explicit table structure block rather than a raw text string assignment
[customizations.installer.kickstart]
contents = """
text
version=DEVEL
keyboard --vckeymap=us --xlayouts='us'
lang en_US.UTF-8
timezone UTC

bootloader --location=mbr
clearpart --all --initlabel
autopart --type=plain
network --bootproto=dhcp --device=link --activate

%pre --interpreter=/usr/bin/bash
# Re-route straight to our runtime profile picker engine
/usr/bin/ask-url.sh
%end

%include /tmp/bootc-target.ks
reboot
"""