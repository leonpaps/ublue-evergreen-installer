name: Build Universal Bootc Evergreen ISO
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Structure the local data trees into the expected filesystem staging root
      # This copies your flat-file database and scripts into the build layer path
      name: Stage ISO Filesystem Root Overrides
      run: |
        mkdir -p squashfs-root
        cp -r default-distros squashfs-root/

      # 2. Compile the installer image manually via a locked, stable compiler binary
      # This uses a production-tested version from early 2024 to step completely around Python 3.14 bugs
      name: Compile Installer ISO via Locked Bootc Image Builder
      run: |
        mkdir -p build-output
        
        sudo podman run \
          --rm \
          --privileged \
          --security-opt label=disable \
          -v ./custom.ks:/custom.ks:ro \
          -v ./squashfs-root:/squashfs-root:ro \
          -v ./build-output:/output \
          quay.io/centos-bootc/bootc-image-builder:0.1.11 \
          --type anaconda-iso \
          --kickstart /custom.ks \
          quay.io/fedora/fedora-bootc:40

      # 3. Save the successfully compiled deployment artifact
      name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
        name: universal-bootc-utility
        path: build-output/anaconda-iso/boot.iso