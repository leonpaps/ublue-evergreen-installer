name: Build Universal Bootc Evergreen ISO
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Move your flat-file database and icon layouts into the ISO filesystem root staging tank
      - name: Stage Distribution Registry
        run: |
          mkdir -p squashfs-root
          cp -r default-distros squashfs-root/

      # Generates your custom minimal ISO utilizing a strictly locked, deterministic base image layer tag
      - name: Generate Minimal Bootc Media
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: "x86_64"
          version: "40"
          variant: "CoreOS" 
          image_name: "fedora-bootc"
          image_repo: "quay.io/fedora/fedora-bootc"
          # Frozen strictly to the stable Fedora 40 core point-release line to block out rolling changes
          image_tag: "40"
          iso_name: "universal-bootc-evergreen.iso"

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-bootc-utility
          path: ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}